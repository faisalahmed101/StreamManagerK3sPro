apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-manager
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stream-manager
  template:
    metadata:
      labels:
        app: stream-manager
    spec:
      serviceAccountName: stream-manager-sa
      containers:
      - name: stream-manager
        image: stream-manager:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 9090
        env:
        - name: MANAGER_API_KEY
          value: "faisal1215"
---
apiVersion: v1
kind: Service
metadata:
  name: stream-manager-svc
  namespace: default
spec:
  type: NodePort
  selector:
    app: stream-manager
  ports:
  - port: 9090
    targetPort: 9090
    nodePort: 30090